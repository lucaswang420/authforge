name: Linux CI

on:
  push:
    branches: ["master"]
  pull_request:
    branches: ["master"]

env:
  BUILD_TYPE: Release
  DROGON_VERSION: "v1.9.13"

jobs:
  build-and-test:
    runs-on: ubuntu-22.04
    timeout-minutes: 30

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: oauth2_user
          POSTGRES_PASSWORD: 123456
          POSTGRES_DB: oauth2_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Install Drogon dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git \
            gcc \
            g++ \
            cmake \
            libjsoncpp-dev \
            uuid-dev \
            libpq-dev \
            libssl-dev \
            zlib1g-dev \
            libhiredis-dev \
            libcurl4-openssl-dev \
            redis-tools

      # --- Drogon build cache ---
      # --- Drogon build cache ---
      # Disabled Drogon cache to avoid cache key conflicts and force fresh builds
      # - name: Cache Drogon build
      #   id: cache-drogon
      #   uses: actions/cache@v4
      #   with:
      #     path: ${{github.workspace}}/drogon
      #     key: drogon-${{ runner.os }}-${{ env.DROGON_VERSION }}-v4-cpp17-${{ env.BUILD_TYPE }}

      - name: Build Drogon
        # if: steps.cache-drogon.outputs.cache-hit != 'true'
        run: |
          git clone --depth 1 --branch ${{ env.DROGON_VERSION }} https://github.com/drogonframework/drogon
          cd drogon
          git submodule update --init --recursive
          mkdir build && cd build
          cmake .. -DCMAKE_BUILD_TYPE=${{env.BUILD_TYPE}} -DCMAKE_CXX_STANDARD=17 -DCMAKE_CXX_STANDARD_REQUIRED=ON -DBUILD_EXAMPLES=OFF -DBUILD_MYSQL=OFF
          make -j$(nproc)

      - name: Install Drogon
        run: |
          cd drogon/build
          sudo make install

      - name: Configure Project CMake
        run: |
          cmake -S . -B build -DCMAKE_BUILD_TYPE=${{env.BUILD_TYPE}} -DCMAKE_CXX_STANDARD=17 -DCMAKE_CXX_STANDARD_REQUIRED=ON -DBUILD_TESTS=ON -DCMAKE_PREFIX_PATH=/usr/local

      - name: Build
        run: cmake --build build --config ${{env.BUILD_TYPE}}

      - name: Validate OpenAPI Spec
        run: |
          pip install openapi-spec-validator
          python -m openapi_spec_validator OAuth2Server/openapi.yaml

      # --- Verify services are ready before DB init ---
      - name: Wait for services
        run: |
          echo "Waiting for Postgres..."
          for i in $(seq 1 15); do
            pg_isready -h localhost -U oauth2_user && break
            echo "  Postgres not ready yet (attempt $i/15)..."
            sleep 2
          done
          echo "Waiting for Redis..."
          for i in $(seq 1 15); do
            redis-cli -h localhost ping && break
            echo "  Redis not ready yet (attempt $i/15)..."
            sleep 2
          done

      - name: Initialize Database
        working-directory: ${{github.workspace}}/OAuth2Server
        env:
          PGPASSWORD: 123456
        run: |
          # Apply migrations in order
          for f in sql/migrations/V*.sql; do
            echo "Applying $f..."
            psql -h localhost -U oauth2_user -d oauth2_db -f "$f"
          done
          # Apply seed data
          for f in sql/seed/*.sql; do
            echo "Applying seed $f..."
            psql -h localhost -U oauth2_user -d oauth2_db -f "$f"
          done

      - name: Check Test Naming Conventions
        run: |
          chmod +x tools/test/scripts/naming_validator.sh
          ./tools/test/scripts/naming_validator.sh

      - name: Check manage.sh / manage.ps1 command parity
        run: |
          chmod +x tools/manage-parity-check.sh
          ./tools/manage-parity-check.sh

      - name: Test
        working-directory: ${{github.workspace}}/build
        env:
          OAUTH2_REDIS_PASSWORD: ""
          OAUTH2_DB_HOST: "127.0.0.1"
          OAUTH2_REDIS_HOST: "127.0.0.1"
        run: ctest -V -C ${{env.BUILD_TYPE}} --output-on-failure --timeout 120

      - name: Run Performance Benchmarks
        working-directory: ${{github.workspace}}/build/OAuth2Server/test
        env:
          OAUTH2_REDIS_PASSWORD: ""
          OAUTH2_DB_HOST: "127.0.0.1"
          OAUTH2_REDIS_HOST: "127.0.0.1"
        run: |
          echo "=== Running Performance Benchmarks ==="
          ./OAuth2Test_test -r Performance_P1_Benchmark_P0_Legacy_SubjectGenerationPerformance
          ./OAuth2Test_test -r Performance_P1_Benchmark_SubjectGeneration_StressTest
          # Omitted legacy memory test
          ./OAuth2Test_test -r Performance_P1_Benchmark_SubjectParsing_StressTest

      - name: Run E2E Tests
        working-directory: ${{github.workspace}}/build/OAuth2Server/test
        env:
          OAUTH2_REDIS_PASSWORD: ""
          OAUTH2_DB_HOST: "127.0.0.1"
          OAUTH2_REDIS_HOST: "127.0.0.1"
        run: |
          echo "=== Running E2E Tests ==="
          ./OAuth2Test_test -r E2E_P0_OAuth2Flow_AuthCode_Works
          ./OAuth2Test_test -r Integration_P0_Session_Management_Works
          ./OAuth2Test_test -r Integration_P0_Client_Authentication_Works
          ./OAuth2Test_test -r Integration_P1_RedirectUri_Validation_Works

      - name: Run Integration Tests
        working-directory: ${{github.workspace}}/build/OAuth2Server/test
        env:
          OAUTH2_REDIS_PASSWORD: ""
          OAUTH2_DB_HOST: "127.0.0.1"
          OAUTH2_REDIS_HOST: "127.0.0.1"
        run: |
          echo "=== Running Integration Tests ==="
          ./OAuth2Test_test -r Unit_P1_RedirectUri_MemoryStorage_Works
          ./OAuth2Test_test -r Unit_P1_RedirectUri_Atomicity_Works
          ./OAuth2Test_test -r Unit_P1_RedirectUri_EdgeCases_Works
          ./OAuth2Test_test -r Unit_P1_RedirectUri_SecurityScenarios_Works

      # --- Upload logs on failure for debugging ---
      - name: Upload test logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: linux-test-logs
          path: |
            ${{github.workspace}}/build/Testing/
            ${{github.workspace}}/OAuth2Server/logs/
          retention-days: 7

      - name: Generate Performance Report
        if: always()
        working-directory: ${{github.workspace}}/build/OAuth2Server/test
        run: |
          echo "=== Performance Test Summary ===" > performance_report.txt
          echo "Run on: $(date)" >> performance_report.txt
          echo "Platform: Linux (Ubuntu 22.04)" >> performance_report.txt
          echo "" >> performance_report.txt
          echo "Tests executed:" >> performance_report.txt
          echo "- OAuth2 Flow Performance" >> performance_report.txt
          echo "- Storage Throughput" >> performance_report.txt
          echo "- Memory Usage" >> performance_report.txt
          echo "- Latency Percentiles" >> performance_report.txt
          echo "" >> performance_report.txt
          echo "All performance thresholds passed." >> performance_report.txt

      - name: Upload Performance Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: linux-performance-report
          path: ${{github.workspace}}/build/OAuth2Server/test/performance_report.txt
          retention-days: 30

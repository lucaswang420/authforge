name: Windows CI

on:
  push:
    branches: ["master"]
  pull_request:
    branches: ["master"]

env:
  BUILD_TYPE: Release
  DROGON_VERSION: "v1.9.13"

jobs:
  build-and-test:
    runs-on: windows-2022
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      # --- Frontend error-mapping property tests (Requirement 12.5) ---
      # Release-readiness gate for the shared Frontend_Error_Module: pure
      # vitest + fast-check property tests (errorAdapter / message catalog /
      # cross-app consistency). DB-independent, so they gate the pipeline early.
      # npm steps use bash for cross-platform path handling on the Windows runner.
      - name: Set up Node.js (frontend property tests)
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run Frontend Error-Mapping Property Tests (Req 12.5)
        working-directory: ${{github.workspace}}/OAuth2Frontend
        run: |
          echo "=== OAuth2Frontend: error-mapping property tests (Property 11/12/13/14) ==="
          npm ci
          npm run test:unit
        shell: bash

      - name: Run Admin Error-Mapping Property Tests (Req 12.5)
        working-directory: ${{github.workspace}}/OAuth2Admin
        run: |
          echo "=== OAuth2Admin: error-mapping property tests (shared errorAdapter source) ==="
          npm ci
          npm run test:unit
        shell: bash

      - name: Install Conan
        run: |
          pip install conan
          conan profile detect --force

      # --- Conan dependency cache ---
      # Disabled Conan cache to avoid cache-related conflicts
      # - name: Cache Conan packages
      #   uses: actions/cache@v4
      #   with:
      #     path: ~/.conan2
      #     key: conan-${{ runner.os }}-v3-cpp17-${{ hashFiles('conanfile.txt') }}
      #     restore-keys: |
      #       conan-${{ runner.os }}-

      - name: Configure CMake using Conan
        # NOTE: OpenSSL is required for OAuth2 token hashing and OIDC JWT signing.
        # It is installed via Conan (--build=openssl) and linked through the
        # conan_toolchain.cmake file, which sets CMAKE_PREFIX_PATH automatically.
        run: |
          # Remove old build directory to avoid cache conflicts
          Remove-Item -Path build -Recurse -Force -ErrorAction SilentlyContinue
          conan install . --output-folder=build --build=openssl --build=missing -s build_type=${{env.BUILD_TYPE}} -s compiler.cppstd=17

      # --- Drogon build cache ---
      # Disabled Drogon cache to avoid cache key conflicts and force fresh builds
      # - name: Cache Drogon build
      #   id: cache-drogon
      #   uses: actions/cache@v4
      #   with:
      #     path: ${{github.workspace}}/drogon
      #     key: drogon-${{ runner.os }}-${{ env.DROGON_VERSION }}-v6-full-components-${{ env.BUILD_TYPE }}

      - name: Skip database installation
        run: Write-Host "Skipping PostgreSQL and Redis installation to speed up CI"

      - name: Build Drogon
        # if: steps.cache-drogon.outputs.cache-hit != 'true'
        run: |
          git clone --depth 1 --branch ${{ env.DROGON_VERSION }} https://github.com/drogonframework/drogon
          cd drogon
          git submodule update --init --recursive
          mkdir build && cd build
          cmake .. `
            -G "Visual Studio 17 2022" `
            -A x64 `
            -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }} `
            -DCMAKE_CXX_STANDARD=17 `
            -DCMAKE_CXX_STANDARD_REQUIRED=ON `
            -DCMAKE_INSTALL_PREFIX="C:\Drogon" `
            -DCMAKE_TOOLCHAIN_FILE="${{github.workspace}}/build/conan_toolchain.cmake" `
            -DCMAKE_POLICY_DEFAULT_CMP0091=NEW `
            -DBUILD_CTL=ON `
            -DBUILD_ORM=ON `
            -DBUILD_EXAMPLES=OFF `
            -DBUILD_POSTGRESQL=ON `
            -DBUILD_MYSQL=OFF `
            -DBUILD_SQLITE=ON `
            -DBUILD_REDIS=ON `
            -DBUILD_BROTLI=ON `
            -DBUILD_YAML_CONFIG=ON
          cmake --build . --config ${{ env.BUILD_TYPE }} --target install --parallel $env:NUMBER_OF_PROCESSORS

      - name: Skip database initialization
        run: |
          Write-Host "Skipping database initialization - databases not installed"
          # Add Drogon to PATH for drogon_ctl
          echo "C:\Drogon\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Prepare CI Config
        run: |
          # Backup original config and use CI config with memory storage
          # This must happen BEFORE cmake configure so configure_file picks it up
          mv OAuth2Server/config.json OAuth2Server/config.json.backup
          cp OAuth2Server/config.ci.json OAuth2Server/config.json
        shell: bash

      - name: Configure Project CMake
        run: |
          cmake -S . -B build -G "Visual Studio 17 2022" -A x64 -DCMAKE_BUILD_TYPE=${{env.BUILD_TYPE}} -DCMAKE_CXX_STANDARD=17 -DCMAKE_CXX_STANDARD_REQUIRED=ON -DCMAKE_TOOLCHAIN_FILE="${{github.workspace}}/build/conan_toolchain.cmake" -DCMAKE_POLICY_DEFAULT_CMP0091=NEW -DCMAKE_PREFIX_PATH="C:\Drogon" -DDrogon_DIR="C:\Drogon\lib\cmake\Drogon" -DBUILD_TESTS=ON

      - name: Build
        run: cmake --build build --config ${{env.BUILD_TYPE}}

      - name: Run Tests
        working-directory: ${{github.workspace}}/build
        env:
          # Ensure no accidental DB/Redis connections are attempted
          OAUTH2_DB_HOST: ""
          OAUTH2_REDIS_HOST: ""
        run: |
          # Explicitly copy CI config to test working directory as a safeguard.
          # Using relative paths to avoid backslash escaping issues in bash on Windows.
          cp ../OAuth2Server/config.ci.json ./OAuth2Server/test/${{env.BUILD_TYPE}}/config.json
          ctest -V -C ${{env.BUILD_TYPE}} --output-on-failure --timeout 120
        shell: bash

      # --- Error-Standardization release-readiness gate (Requirement 12.7) ---
      # Explicit, attributable gate over the error-code/message-standardization
      # backend suite. The ctest step above already runs the whole binary, but
      # per Requirement 12.7 these headline tests are named individually so a
      # failure is directly attributable to the gated requirement:
      #   - Property 5 catalog completeness & uniqueness
      #   - Property 4 / Req 12.2 HTTP status <-> catalog/category consistency
      #   - Property 3 / Req 12.3 Error Envelope serialization round-trip
      #   - Property 1/2/7/8 Error Envelope structural & numeric_code invariants
      #   - Property 6 / Req 12.4 production-mode safety isolation (see note below)
      #   - Property 9 RFC 6749 protocol compliance
      #   - Property 10 Request_ID resolution/generation
      #   - Integration_ApplicationEndpoint_* / Req 12.6 endpoint envelope enumeration
      #   - Unit_P0_ErrorCatalogDoc_* / Req 12.1 doc<->catalog consistency
      #
      # NOTE (Req 12.4, dev/staging/prod): Property6_ErrorEnvelope_ProductionModeSafetyIsolation
      # forces Production_Mode internally via an ErrorContext override, so it is
      # config-independent BY CONSTRUCTION and asserts the no-leak guarantee under
      # every environment configuration. It is therefore run here explicitly in
      # addition to executing as part of the full binary above.
      - name: Run Error-Standardization Backend Tests (Req 12.2/12.3/12.4/12.6/12.1)
        working-directory: ${{github.workspace}}/build/OAuth2Server/test/${{env.BUILD_TYPE}}
        env:
          OAUTH2_DB_HOST: ""
          OAUTH2_REDIS_HOST: ""
        run: |
          echo "=== Error-Standardization: property + consistency tests (Req 12.2/12.3) ==="
          ./OAuth2Test_test.exe -r Property5_ErrorCatalog_EveryEntrySatisfiesInvariants
          ./OAuth2Test_test.exe -r Property5_ErrorCatalog_CodeAndNumericCodeUnique
          ./OAuth2Test_test.exe -r Property5_ErrorCatalog_OAuthAllowedSetCoveredExactlyOnce
          ./OAuth2Test_test.exe -r Property4_HttpStatus_RuntimeEqualsCatalogRegisteredValue
          ./OAuth2Test_test.exe -r Property4_HttpStatus_CatalogValueMatchesCategoryMapping
          ./OAuth2Test_test.exe -r Property4_HttpStatus_SameCategoryConsistency
          ./OAuth2Test_test.exe -r Property3_ErrorEnvelope_SerializationRoundTrip
          ./OAuth2Test_test.exe -r Property1_ErrorEnvelope_StructuralInvariants
          ./OAuth2Test_test.exe -r Property2_ErrorEnvelope_NumericCodeCorrectnessAndOmission
          ./OAuth2Test_test.exe -r Property7_ErrorEnvelope_NonProductionDiagnosticDetails
          ./OAuth2Test_test.exe -r Property8_ErrorEnvelope_UnmappedExceptionInternalFallback
          ./OAuth2Test_test.exe -r Property9_OAuth2Error_Rfc6749Compliance
          ./OAuth2Test_test.exe -r Property10_RequestId_ResolveAndGenerate
          echo "=== Error-Standardization: security safety isolation (Property 6 / Req 12.4, dev/staging/prod) ==="
          # Config-independent by construction (forces Production_Mode via ErrorContext override).
          ./OAuth2Test_test.exe -r Property6_ErrorEnvelope_ProductionModeSafetyIsolation
          echo "=== Error-Standardization: Application_Endpoint envelope enumeration (Req 12.6) ==="
          ./OAuth2Test_test.exe -r Integration_ApplicationEndpoint_AllCatalogCodes_BuildResponse_AreEnvelopes
          ./OAuth2Test_test.exe -r Integration_ApplicationEndpoint_ResponderEntries_AreEnvelopes
          ./OAuth2Test_test.exe -r Integration_ApplicationEndpoint_UnregisteredCode_FallsBackToEnvelope
          echo "=== Error-Standardization: catalog<->doc consistency (Req 12.1) ==="
          ./OAuth2Test_test.exe -r Unit_P0_ErrorCatalogDoc_ApplicationTableMatchesCatalog
          ./OAuth2Test_test.exe -r Unit_P0_ErrorCatalogDoc_OAuthTableMatchesCatalog
        shell: bash

      - name: Run Performance Benchmarks
        working-directory: ${{github.workspace}}/build/OAuth2Server/test/${{env.BUILD_TYPE}}
        env:
          OAUTH2_DB_HOST: ""
          OAUTH2_REDIS_HOST: ""
        run: |
          echo "=== Running Performance Benchmarks ==="
          ./OAuth2Test_test.exe -r Performance_P1_Benchmark_P0_Legacy_SubjectGenerationPerformance
          ./OAuth2Test_test.exe -r Performance_P1_Benchmark_SubjectGeneration_StressTest
          # Omitted legacy memory test
          ./OAuth2Test_test.exe -r Performance_P1_Benchmark_SubjectParsing_StressTest
        shell: bash

      - name: Run E2E Tests
        working-directory: ${{github.workspace}}/build/OAuth2Server/test/${{env.BUILD_TYPE}}
        env:
          OAUTH2_DB_HOST: ""
          OAUTH2_REDIS_HOST: ""
        run: |
          echo "=== Running E2E Tests ==="
          ./OAuth2Test_test.exe -r E2E_P0_OAuth2Flow_AuthCode_Works
          ./OAuth2Test_test.exe -r Integration_P0_Session_Management_Works
          ./OAuth2Test_test.exe -r Integration_P0_Client_Authentication_Works
          ./OAuth2Test_test.exe -r Integration_P1_RedirectUri_Validation_Works
        shell: bash

      - name: Run Integration Tests
        working-directory: ${{github.workspace}}/build/OAuth2Server/test/${{env.BUILD_TYPE}}
        env:
          OAUTH2_DB_HOST: ""
          OAUTH2_REDIS_HOST: ""
        run: |
          echo "=== Running Integration Tests ==="
          ./OAuth2Test_test.exe -r Unit_P1_RedirectUri_MemoryStorage_Works
          ./OAuth2Test_test.exe -r Unit_P1_RedirectUri_Atomicity_Works
          ./OAuth2Test_test.exe -r Unit_P1_RedirectUri_EdgeCases_Works
          ./OAuth2Test_test.exe -r Unit_P1_RedirectUri_SecurityScenarios_Works
        shell: bash

      - name: Restore original config
        if: always()
        run: |
          # Restore original config after tests
          mv OAuth2Server/config.json.backup OAuth2Server/config.json
        shell: bash

      - name: Check manage.sh / manage.ps1 command parity
        run: |
          bash tools/manage-parity-check.sh
        shell: bash

      # --- Upload logs on failure for debugging ---
      - name: Upload test logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: windows-test-logs
          path: |
            ${{github.workspace}}/build/Testing/
            ${{github.workspace}}/OAuth2Server/logs/
          retention-days: 7

components:
  schemas:
    Error:
      properties:
        category:
          type: string
        code:
          type: integer
        details:
          type: string
        message:
          type: string
        request_id:
          type: string
      type: object
    TokenResponse:
      properties:
        access_token:
          type: string
        expires_in:
          type: integer
        refresh_token:
          type: string
        token_type:
          type: string
      type: object
  securitySchemes:
    bearerAuth:
      scheme: bearer
      type: http
info:
  description: OAuth2.0 authorization server with token management
  title: OAuth2 Authorization Server API
  version: 1.0.0
openapi: 3.0.0
paths:
  /.well-known/jwks.json:
    get:
      description: Returns the public keys used by this server to sign JWTs.
      operationId: get_.well-known_jwks.json
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
          description: JSON Web Key Set
      summary: JSON Web Key Set
      tags:
      - OpenID Connect
      - Security
  /.well-known/openid-configuration:
    get:
      description: Returns OIDC discovery metadata including endpoints and supported
        scopes.
      operationId: get_.well-known_openid-configuration
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
          description: OIDC Provider Metadata
      summary: OpenID Connect Discovery
      tags:
      - OpenID Connect
  /api/admin/clients:
    get:
      description: Get a paginated list of registered OAuth2 clients.
      operationId: get_api_admin_clients
      responses:
        '200':
          description: List of OAuth2 clients
        '401':
          description: Unauthorized
      security:
      - bearerAuth: []
      summary: List OAuth2 Clients
      tags:
      - Admin
      - Clients
    post:
      description: Register a new OAuth2 client.
      operationId: post_api_admin_clients
      responses:
        '201':
          description: Client created successfully
        '401':
          description: Unauthorized
      security:
      - bearerAuth: []
      summary: Create OAuth2 Client
      tags:
      - Admin
      - Clients
  /api/admin/clients/{clientId}:
    delete:
      description: Delete a specific OAuth2 client.
      operationId: delete_api_admin_clients_{clientId}
      parameters:
      - description: Client ID
        in: path
        name: clientId
        required: true
        schema:
          type: string
      responses:
        '200':
          description: Client deleted successfully
        '401':
          description: Unauthorized
        '404':
          description: Client not found
      security:
      - bearerAuth: []
      summary: Delete OAuth2 Client
      tags:
      - Admin
      - Clients
    get:
      description: Get details of a specific OAuth2 client by ID.
      operationId: get_api_admin_clients_{clientId}
      parameters:
      - description: Client ID
        in: path
        name: clientId
        required: true
        schema:
          type: string
      responses:
        '200':
          description: Client details
        '401':
          description: Unauthorized
        '404':
          description: Client not found
      security:
      - bearerAuth: []
      summary: Get Client Details
      tags:
      - Admin
      - Clients
    put:
      description: Update details of a specific OAuth2 client.
      operationId: put_api_admin_clients_{clientId}
      parameters:
      - description: Client ID
        in: path
        name: clientId
        required: true
        schema:
          type: string
      responses:
        '200':
          description: Client updated successfully
        '400':
          description: Invalid request body
        '401':
          description: Unauthorized
        '404':
          description: Client not found
      security:
      - bearerAuth: []
      summary: Update OAuth2 Client
      tags:
      - Admin
      - Clients
  /api/admin/clients/{clientId}/reset-secret:
    post:
      description: Reset the secret of a specific OAuth2 client.
      operationId: post_api_admin_clients_{clientId}_reset-secret
      parameters:
      - description: Client ID
        in: path
        name: clientId
        required: true
        schema:
          type: string
      responses:
        '200':
          description: Client secret reset successfully
        '401':
          description: Unauthorized
        '404':
          description: Client not found
      security:
      - bearerAuth: []
      summary: Reset Client Secret
      tags:
      - Admin
      - Clients
  /api/admin/clients/{clientId}/scopes:
    get:
      description: Get the assigned scopes for an OAuth2 client.
      operationId: get_api_admin_clients_{clientId}_scopes
      parameters:
      - description: Client ID
        in: path
        name: clientId
        required: true
        schema:
          type: string
      responses:
        '200':
          description: Client scopes retrieved
        '401':
          description: Unauthorized
      security:
      - bearerAuth: []
      summary: Get Client Scopes
      tags:
      - Admin
      - Clients
    put:
      description: Update the assigned scopes for an OAuth2 client.
      operationId: put_api_admin_clients_{clientId}_scopes
      parameters:
      - description: Client ID
        in: path
        name: clientId
        required: true
        schema:
          type: string
      responses:
        '200':
          description: Client scopes updated successfully
        '400':
          description: Invalid request body
        '401':
          description: Unauthorized
      security:
      - bearerAuth: []
      summary: Update Client Scopes
      tags:
      - Admin
      - Clients
  /api/admin/logs:
    get:
      description: Get a paginated list of system audit logs.
      operationId: get_api_admin_logs
      responses:
        '200':
          description: Audit logs list
        '401':
          description: Unauthorized
      security:
      - bearerAuth: []
      summary: List Audit Logs
      tags:
      - Admin
      - Logs
  /api/admin/oidc/keys:
    get:
      description: Get information about OIDC signing keys.
      operationId: get_api_admin_oidc_keys
      responses:
        '200':
          description: OIDC signing key information
        '401':
          description: Unauthorized
      security:
      - bearerAuth: []
      summary: Get OIDC Keys Info
      tags:
      - Admin
      - OIDC
  /api/admin/tokens:
    get:
      description: Get a list of active OAuth2 tokens.
      operationId: get_api_admin_tokens
      responses:
        '200':
          description: Tokens list
        '401':
          description: Unauthorized
      security:
      - bearerAuth: []
      summary: List Tokens
      tags:
      - Admin
      - Tokens
  /api/admin/tokens/revoke-by-client:
    post:
      description: Revoke all tokens issued to a specific client.
      operationId: post_api_admin_tokens_revoke-by-client
      responses:
        '200':
          description: Tokens revoked successfully
        '400':
          description: Invalid request body
        '401':
          description: Unauthorized
      security:
      - bearerAuth: []
      summary: Revoke Tokens By Client
      tags:
      - Admin
      - Tokens
  /api/admin/tokens/revoke-by-user:
    post:
      description: Revoke all tokens issued for a specific user.
      operationId: post_api_admin_tokens_revoke-by-user
      responses:
        '200':
          description: Tokens revoked successfully
        '400':
          description: Invalid request body
        '401':
          description: Unauthorized
      security:
      - bearerAuth: []
      summary: Revoke Tokens By User
      tags:
      - Admin
      - Tokens
  /api/admin/tokens/{tokenPrefix}:
    delete:
      description: Revoke a specific token by its prefix.
      operationId: delete_api_admin_tokens_{tokenPrefix}
      parameters:
      - description: Token prefix
        in: path
        name: tokenPrefix
        required: true
        schema:
          type: string
      responses:
        '200':
          description: Token revoked successfully
        '401':
          description: Unauthorized
        '404':
          description: Token not found
      security:
      - bearerAuth: []
      summary: Revoke Token
      tags:
      - Admin
      - Tokens
  /api/admin/users:
    get:
      description: Get a paginated list of users.
      operationId: get_api_admin_users
      responses:
        '200':
          description: Users list
        '401':
          description: Unauthorized
      security:
      - bearerAuth: []
      summary: List Users
      tags:
      - Admin
      - Users
  /api/admin/users/{userId}/disable:
    put:
      description: Disable a specific user account.
      operationId: put_api_admin_users_{userId}_disable
      parameters:
      - description: User ID
        in: path
        name: userId
        required: true
        schema:
          type: integer
      responses:
        '200':
          description: User disabled successfully
        '401':
          description: Unauthorized
        '404':
          description: User not found
      security:
      - bearerAuth: []
      summary: Disable User
      tags:
      - Admin
      - Users
  /api/admin/users/{userId}/roles:
    get:
      description: Get the roles assigned to a specific user.
      operationId: get_api_admin_users_{userId}_roles
      parameters:
      - description: User ID
        in: path
        name: userId
        required: true
        schema:
          type: integer
      responses:
        '200':
          content:
            application/json:
              schema:
                properties:
                  roles:
                    items:
                      properties:
                        description:
                          type: string
                        id:
                          type: integer
                        name:
                          type: string
                      type: object
                    type: array
                  status:
                    type: string
                type: object
          description: User roles retrieved
        '404':
          description: User not found
      security:
      - bearerAuth: []
      summary: Get User Roles
      tags:
      - Admin
      - Users
    put:
      description: Assign roles to a specific user.
      operationId: put_api_admin_users_{userId}_roles
      parameters:
      - description: User ID
        in: path
        name: userId
        required: true
        schema:
          type: integer
      requestBody:
        content:
          application/json:
            schema:
              properties:
                roles:
                  items:
                    type: string
                  type: array
              required:
              - roles
              type: object
      responses:
        '200':
          description: Roles assigned successfully
        '400':
          description: Invalid request body
      security:
      - bearerAuth: []
      summary: Assign User Roles
      tags:
      - Admin
      - Users
  /api/admin/users/{userId}:
    get:
      description: Get detailed information about a specific user including roles and
        account status.
      operationId: get_api_admin_users_{userId}
      parameters:
      - description: User ID
        in: path
        name: userId
        required: true
        schema:
          type: integer
      responses:
        '200':
          content:
            application/json:
              schema:
                properties:
                  created_at:
                    type: string
                  email:
                    type: string
                  email_verified:
                    type: boolean
                  failed_login_count:
                    type: integer
                  id:
                    type: integer
                  locked:
                    type: boolean
                  locked_until:
                    type: integer
                  mfa_enabled:
                    type: boolean
                  roles:
                    items:
                      type: string
                    type: array
                  status:
                    type: string
                  username:
                    type: string
                type: object
          description: User details
        '404':
          description: User not found
      security:
      - bearerAuth: []
      summary: Get User Detail
      tags:
      - Admin
      - Users
    put:
      description: Update user information (email, email_verified).
      operationId: put_api_admin_users_{userId}
      parameters:
      - description: User ID
        in: path
        name: userId
        required: true
        schema:
          type: integer
      requestBody:
        content:
          application/json:
            schema:
              properties:
                email:
                  type: string
                email_verified:
                  type: boolean
              type: object
      responses:
        '200':
          description: User updated successfully
        '404':
          description: User not found
      security:
      - bearerAuth: []
      summary: Update User
      tags:
      - Admin
      - Users
  /api/admin/users/{userId}/enable:
    post:
      description: Enable a disabled user account by resetting lockout state.
      operationId: post_api_admin_users_{userId}_enable
      parameters:
      - description: User ID
        in: path
        name: userId
        required: true
        schema:
          type: integer
      responses:
        '200':
          description: User enabled successfully
        '404':
          description: User not found
      security:
      - bearerAuth: []
      summary: Enable User
      tags:
      - Admin
      - Users
  /api/admin/roles:
    get:
      description: Get a list of all roles with user counts.
      operationId: get_api_admin_roles
      responses:
        '200':
          content:
            application/json:
              schema:
                properties:
                  roles:
                    items:
                      properties:
                        created_at:
                          type: string
                        description:
                          type: string
                        id:
                          type: integer
                        name:
                          type: string
                        user_count:
                          type: integer
                      type: object
                    type: array
                  status:
                    type: string
                  total:
                    type: integer
                type: object
          description: Roles list
      security:
      - bearerAuth: []
      summary: List Roles
      tags:
      - Admin
      - Roles
    post:
      description: Create a new role. Built-in roles (admin, user) cannot be duplicated.
      operationId: post_api_admin_roles
      requestBody:
        content:
          application/json:
            schema:
              properties:
                description:
                  type: string
                name:
                  type: string
              required:
              - name
              type: object
      responses:
        '201':
          description: Role created successfully
        '400':
          description: Invalid request
        '409':
          description: Role name already exists
      security:
      - bearerAuth: []
      summary: Create Role
      tags:
      - Admin
      - Roles
  /api/admin/roles/{roleId}:
    delete:
      description: Delete a role. Built-in roles (admin, user) cannot be deleted.
      operationId: delete_api_admin_roles_{roleId}
      parameters:
      - description: Role ID
        in: path
        name: roleId
        required: true
        schema:
          type: integer
      responses:
        '200':
          description: Role deleted successfully
        '404':
          description: Role not found or is built-in
      security:
      - bearerAuth: []
      summary: Delete Role
      tags:
      - Admin
      - Roles
    put:
      description: Update a role's description.
      operationId: put_api_admin_roles_{roleId}
      parameters:
      - description: Role ID
        in: path
        name: roleId
        required: true
        schema:
          type: integer
      requestBody:
        content:
          application/json:
            schema:
              properties:
                description:
                  type: string
              type: object
      responses:
        '200':
          description: Role updated successfully
        '404':
          description: Role not found
      security:
      - bearerAuth: []
      summary: Update Role
      tags:
      - Admin
      - Roles
  /api/admin/scopes:
    get:
      description: Get a list of all available scopes.
      operationId: get_api_admin_scopes
      responses:
        '200':
          content:
            application/json:
              schema:
                properties:
                  scopes:
                    items:
                      properties:
                        description:
                          type: string
                        id:
                          type: integer
                        is_default:
                          type: boolean
                        mapped_role:
                          type: string
                        name:
                          type: string
                        requires_admin_role:
                          type: boolean
                      type: object
                    type: array
                  status:
                    type: string
                  total:
                    type: integer
                type: object
          description: Scopes list
      security:
      - bearerAuth: []
      summary: List Scopes
      tags:
      - Admin
      - Scopes
    post:
      description: Create a new OAuth2 scope. Built-in scopes cannot be duplicated.
      operationId: post_api_admin_scopes
      requestBody:
        content:
          application/json:
            schema:
              properties:
                description:
                  type: string
                is_default:
                  type: boolean
                mapped_role:
                  type: string
                name:
                  type: string
                requires_admin_role:
                  type: boolean
              required:
              - name
              type: object
      responses:
        '201':
          description: Scope created successfully
        '400':
          description: Invalid request
        '409':
          description: Scope name already exists
      security:
      - bearerAuth: []
      summary: Create Scope
      tags:
      - Admin
      - Scopes
  /api/admin/scopes/{scopeId}:
    delete:
      description: Delete a scope. Built-in scopes (openid, profile, email, admin)
        cannot be deleted.
      operationId: delete_api_admin_scopes_{scopeId}
      parameters:
      - description: Scope ID
        in: path
        name: scopeId
        required: true
        schema:
          type: integer
      responses:
        '200':
          description: Scope deleted successfully
        '404':
          description: Scope not found or is built-in
      security:
      - bearerAuth: []
      summary: Delete Scope
      tags:
      - Admin
      - Scopes
    put:
      description: Update a scope's properties.
      operationId: put_api_admin_scopes_{scopeId}
      parameters:
      - description: Scope ID
        in: path
        name: scopeId
        required: true
        schema:
          type: integer
      requestBody:
        content:
          application/json:
            schema:
              properties:
                description:
                  type: string
                is_default:
                  type: boolean
                mapped_role:
                  type: string
                requires_admin_role:
                  type: boolean
              type: object
      responses:
        '200':
          description: Scope updated successfully
        '404':
          description: Scope not found
      security:
      - bearerAuth: []
      summary: Update Scope
      tags:
      - Admin
      - Scopes
  /api/admin/dashboard/stats:
    get:
      description: Get dashboard statistics including user count, client count, active
        tokens, and failure metrics.
      operationId: get_api_admin_dashboard_stats
      responses:
        '200':
          content:
            application/json:
              schema:
                properties:
                  active_tokens:
                    type: integer
                  failures_today:
                    type: integer
                  logs_today:
                    type: integer
                  status:
                    type: string
                  total_clients:
                    type: integer
                  total_users:
                    type: integer
                type: object
          description: Dashboard statistics
      security:
      - bearerAuth: []
      summary: Get Dashboard Stats
      tags:
      - Admin
      - Dashboard
  /api/github/login:
    post:
      description: Exchange GitHub authorization code for user information. This endpoint
        handles the server-side OAuth2 flow with GitHub.
      operationId: post_api_github_login
      parameters:
      - description: Authorization code from GitHub OAuth2 callback (required)
        in: query
        name: code
        required: true
        schema:
          type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                properties:
                  avatar_url:
                    type: string
                  email:
                    type: string
                  id:
                    type: integer
                  login:
                    type: string
                  name:
                    type: string
                type: object
          description: GitHub user info retrieved successfully
        '400':
          description: Invalid request (missing or invalid code)
        '502':
          description: Failed to contact GitHub API
      summary: GitHub OAuth2 Login
      tags:
      - External Auth
      - GitHub
  /api/google/login:
    post:
      description: Exchange Google authorization code for user information. This endpoint
        handles the server-side OAuth2 flow with Google Identity Platform.
      operationId: post_api_google_login
      parameters:
      - description: Authorization code from Google OAuth2 callback (required)
        in: query
        name: code
        required: true
        schema:
          type: string
      responses:
        '200':
          content:
            application/json:
              example:
                email: john.doe@gmail.com
                name: John Doe
                picture: https://lh3.googleusercontent.com/...
                sub: '123456789012345678901'
          description: Google user info retrieved successfully
        '400':
          content:
            application/json:
              example:
                error: Missing code parameter
          description: Invalid request (missing or invalid code)
        '502':
          description: Failed to contact Google API
      summary: Google OAuth2 Login
      tags:
      - External Auth
      - Google
  /api/me:
    delete:
      description: Soft-delete the current user's account.
      operationId: delete_api_me
      responses:
        '200':
          description: Account deleted successfully
        '401':
          description: Unauthorized
        '404':
          description: User not found
      security:
      - bearerAuth: []
      summary: Delete Account
      tags:
      - User Profile
    get:
      description: Get current user's profile information.
      operationId: get_api_me
      responses:
        '200':
          description: User profile
        '401':
          description: Unauthorized
        '404':
          description: User not found
      security:
      - bearerAuth: []
      summary: Get User Profile
      tags:
      - User Profile
  /api/me/authorized-apps:
    get:
      description: List OAuth2 clients authorized by the current user.
      operationId: get_api_me_authorized-apps
      responses:
        '200':
          description: Authorized apps list
        '401':
          description: Unauthorized
      security:
      - bearerAuth: []
      summary: List Authorized Apps
      tags:
      - User Profile
  /api/me/authorized-apps/{clientId}:
    delete:
      description: Revoke the current user's authorization for a specific OAuth2 client.
      operationId: delete_api_me_authorized-apps_{clientId}
      parameters:
      - description: Client ID
        in: path
        name: clientId
        required: true
        schema:
          type: string
      responses:
        '200':
          description: Authorization revoked successfully
        '401':
          description: Unauthorized
        '404':
          description: User not found
      security:
      - bearerAuth: []
      summary: Revoke App Authorization
      tags:
      - User Profile
  /api/me/password:
    put:
      description: Change the current user's password.
      operationId: put_api_me_password
      responses:
        '200':
          description: Password changed successfully
        '400':
          description: Invalid request body
        '401':
          description: Unauthorized or current password incorrect
        '404':
          description: User not found
      security:
      - bearerAuth: []
      summary: Change Password
      tags:
      - User Profile
  /api/orgs:
    get:
      description: List all organizations.
      operationId: get_api_orgs
      responses:
        '200':
          description: Organizations list
        '401':
          description: Unauthorized
      security:
      - bearerAuth: []
      summary: List Organizations
      tags:
      - Organization
    post:
      description: Create a new organization.
      operationId: post_api_orgs
      responses:
        '201':
          description: Organization created
        '400':
          description: Invalid request body
        '401':
          description: Unauthorized
        '409':
          description: Organization slug already exists
      security:
      - bearerAuth: []
      summary: Create Organization
      tags:
      - Organization
  /api/orgs/{orgId}/users:
    post:
      description: Add a user to an organization.
      operationId: post_api_orgs_{orgId}_users
      parameters:
      - description: Organization ID
        in: path
        name: orgId
        required: true
        schema:
          type: integer
      responses:
        '200':
          description: User added to organization
        '401':
          description: Unauthorized
      security:
      - bearerAuth: []
      summary: Add User to Organization
      tags:
      - Organization
  /api/password-reset/confirm:
    post:
      description: Confirm a password reset using the token sent via email.
      operationId: post_api_password-reset_confirm
      responses:
        '200':
          description: Password reset successful
        '400':
          description: Invalid or expired token
      summary: Confirm Password Reset
      tags:
      - User Verification
  /api/password-reset/request:
    post:
      description: Request a password reset link to be sent via email.
      operationId: post_api_password-reset_request
      responses:
        '200':
          description: Reset link sent if the email exists
        '400':
          description: Invalid request
      summary: Request Password Reset
      tags:
      - User Verification
  /api/register:
    post:
      description: Registers a new user account into the system.
      operationId: post_api_register
      parameters:
      - description: Desired username (required)
        in: query
        name: username
        required: true
        schema:
          type: string
      - description: Strong password (required)
        in: query
        name: password
        required: true
        schema:
          type: string
      - description: Email address (optional)
        in: query
        name: email
        required: false
        schema:
          type: string
      responses:
        '200':
          content:
            application/json:
              example:
                message: User registered successfully
                status: success
          description: User registered successfully
        '400':
          description: Invalid registration data
      summary: Register new user
      tags:
      - User
      - Registration
  /api/verify-email:
    get:
      description: Verify an email address using a token.
      operationId: get_api_verify-email
      responses:
        '200':
          description: Email verified successfully
        '400':
          description: Invalid or expired token
      summary: Verify Email
      tags:
      - User Verification
  /api/verify-email/resend:
    post:
      description: Resend the email verification link.
      operationId: post_api_verify-email_resend
      responses:
        '200':
          description: Verification email sent
        '400':
          description: Invalid request
        '401':
          description: Unauthorized
        '404':
          description: User not found
      summary: Resend Verification Email
      tags:
      - User Verification
  /api/wechat/login:
    post:
      description: Exchange WeChat authorization code for user information. This endpoint
        handles the server-side OAuth2 flow with WeChat Open Platform.
      operationId: post_api_wechat_login
      parameters:
      - description: Authorization code from WeChat OAuth2 callback (required)
        in: query
        name: code
        required: true
        schema:
          type: string
      responses:
        '200':
          content:
            application/json:
              example:
                headimgurl: https://thirdwx.qlogo.cn/...
                nickname: WeChat User
                openid: oXXXXXXXXXXXXXXXXXXXXXXXXXX
          description: WeChat user info retrieved successfully
        '400':
          content:
            application/json:
              example:
                error: Missing code parameter
          description: Invalid request (missing or invalid code)
        '502':
          description: Failed to contact WeChat API
      summary: WeChat OAuth2 Login
      tags:
      - External Auth
      - WeChat
  /health:
    get:
      description: Returns the health status of the service.
      operationId: get_health
      responses:
        '200':
          content:
            application/json:
              example:
                status: ok
                version: 1.0.0
          description: Service is healthy
      summary: Health check
      tags:
      - System
  /oauth2/authorize:
    get:
      description: OAuth2 authorization endpoint - initiates authorization flow
      operationId: get_oauth2_authorize
      parameters:
      - description: Client identifier (required)
        in: query
        name: client_id
        required: true
        schema:
          type: string
      - description: Redirect URI (required)
        in: query
        name: redirect_uri
        required: true
        schema:
          type: string
      - description: Response type, must be 'code' (required)
        in: query
        name: response_type
        required: true
        schema:
          type: string
      - description: Requested scope (optional)
        in: query
        name: scope
        required: false
        schema:
          type: string
      - description: Opaque value to maintain state between request and callback (recommended)
        in: query
        name: state
        required: false
        schema:
          type: string
      responses:
        '302':
          description: Redirect to client with authorization code
        '400':
          description: Invalid request
      summary: Request authorization
      tags:
      - OAuth2
      - Authorization
  /oauth2/consent:
    post:
      description: Submit user consent for requested scopes. Redirects back to client.
      operationId: post_oauth2_consent
      parameters:
      - description: Client identifier (required)
        in: query
        name: client_id
        required: true
        schema:
          type: string
      - description: User identifier (required)
        in: query
        name: user_id
        required: true
        schema:
          type: string
      - description: Requested scope to consent (required)
        in: query
        name: scope
        required: true
        schema:
          type: string
      - description: Redirect URI (required)
        in: query
        name: redirect_uri
        required: true
        schema:
          type: string
      - description: Opaque value to maintain state
        in: query
        name: state
        required: false
        schema:
          type: string
      - description: 'Action to perform: ''approve'' or ''deny'' (required)'
        in: query
        name: action
        required: true
        schema:
          enum:
          - approve
          - deny
          type: string
      responses:
        '302':
          description: Redirect to client with authorization code or error
      summary: Submit user consent
      tags:
      - OAuth2
      - Consent
  /oauth2/device/verify:
    get:
      description: Display device verification page.
      operationId: get_oauth2_device_verify
      responses:
        '200':
          description: Device verification page
      summary: Verify Device (GET)
      tags:
      - OAuth2
      - Device Flow
    post:
      description: Submit device verification code.
      operationId: post_oauth2_device_verify
      responses:
        '200':
          description: Device verification submitted
      summary: Verify Device (POST)
      tags:
      - OAuth2
      - Device Flow
  /oauth2/device_authorization:
    post:
      description: Request device authorization.
      operationId: post_oauth2_device_authorization
      responses:
        '200':
          description: Device authorization response
        '400':
          description: Invalid request
        '401':
          description: Unauthorized
      security:
      - bearerAuth: []
      summary: Device Authorization
      tags:
      - OAuth2
      - Device Flow
  /oauth2/introspect:
    post:
      description: RFC 7662 OAuth 2.0 Token Introspection. Returns information about
        a token.
      operationId: post_oauth2_introspect
      parameters:
      - description: The string value of the token (required)
        in: query
        name: token
        required: true
        schema:
          type: string
      responses:
        '200':
          content:
            application/json:
              example:
                active: true
                client_id: client_123
                exp: 1680000000
                scope: read write
                sub: user_456
                token_type: Bearer
          description: Token status and metadata
        '400':
          description: Invalid request
        '401':
          description: Authentication failed
      security:
      - bearerAuth: []
      summary: Introspect token
      tags:
      - OAuth2
      - Token
  /oauth2/login:
    post:
      description: Authenticates user credentials and generates an authorization code.
        Usually called by the frontend login page during the authorization code flow.
      operationId: post_oauth2_login
      parameters:
      - description: User's account username (required)
        in: query
        name: username
        required: true
        schema:
          type: string
      - description: User's password (required)
        in: query
        name: password
        required: true
        schema:
          type: string
      - description: Client identifier matches the requesting app (required)
        in: query
        name: client_id
        required: true
        schema:
          type: string
      - description: Redirect URI matching the registered client (required)
        in: query
        name: redirect_uri
        required: true
        schema:
          type: string
      - description: Requested scope, space-separated (optional)
        in: query
        name: scope
        required: false
        schema:
          type: string
      - description: Opaque value to maintain state (recommended)
        in: query
        name: state
        required: false
        schema:
          type: string
      responses:
        '200':
          content:
            application/json:
              example:
                redirect_uri: http://127.0.0.1:5173/callback?code=xyz123
                status: success
          description: Authentication successful (JSON with redirect_uri)
        '302':
          description: Redirect with authorization code (if requested via browser)
        '401':
          content:
            application/json:
              example:
                error: invalid_client
          description: Authentication failed
      summary: Authenticate user
      tags:
      - OAuth2
      - Authentication
  /oauth2/mfa/disable:
    post:
      description: Disable MFA for the authenticated user.
      operationId: post_oauth2_mfa_disable
      responses:
        '200':
          description: MFA disabled successfully
        '401':
          description: Unauthorized
      security:
      - bearerAuth: []
      summary: Disable MFA
      tags:
      - MFA
  /oauth2/mfa/setup:
    post:
      description: Initiate MFA setup by generating a TOTP secret.
      operationId: post_oauth2_mfa_setup
      responses:
        '200':
          description: MFA setup initiated
        '401':
          description: Unauthorized
      security:
      - bearerAuth: []
      summary: Setup MFA
      tags:
      - MFA
  /oauth2/mfa/setup/verify:
    post:
      description: Verify a TOTP code to finalize MFA setup.
      operationId: post_oauth2_mfa_setup_verify
      responses:
        '200':
          description: MFA enabled successfully
        '400':
          description: Invalid request
        '401':
          description: Unauthorized or invalid code
      security:
      - bearerAuth: []
      summary: Verify MFA Setup
      tags:
      - MFA
  /oauth2/mfa/verify:
    post:
      description: Verify MFA code during login.
      operationId: post_oauth2_mfa_verify
      responses:
        '200':
          description: MFA verification successful
        '400':
          description: Invalid request
        '401':
          description: Invalid MFA code
      summary: Verify MFA Code (Login)
      tags:
      - MFA
  /oauth2/register:
    post:
      description: Dynamic client registration.
      operationId: post_oauth2_register
      responses:
        '201':
          description: Client registered successfully
        '400':
          description: Invalid client metadata
        '401':
          description: Unauthorized
      security:
      - bearerAuth: []
      summary: Register Client
      tags:
      - OAuth2
      - Dynamic Registration
  /oauth2/revoke:
    post:
      description: RFC 7009 OAuth 2.0 Token Revocation. Revokes an access or refresh
        token.
      operationId: post_oauth2_revoke
      parameters:
      - description: The token that the client wants to get revoked (required)
        in: query
        name: token
        required: true
        schema:
          type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
          description: Token revoked successfully or token did not exist
        '400':
          description: Invalid request
        '401':
          description: Authentication failed
      security:
      - bearerAuth: []
      summary: Revoke token
      tags:
      - OAuth2
      - Token
  /oauth2/token:
    post:
      description: OAuth2 token endpoint - exchanges authorization code or refresh
        token for access token.
      operationId: post_oauth2_token
      parameters:
      - description: Type of grant being requested
        in: query
        name: grant_type
        required: true
        schema:
          enum:
          - authorization_code
          - refresh_token
          - client_credentials
          type: string
      - description: Authorization code (required for grant_type=authorization_code)
        in: query
        name: code
        required: false
        schema:
          type: string
      - description: Refresh token (required for grant_type=refresh_token)
        in: query
        name: refresh_token
        required: false
        schema:
          type: string
      - description: Client identifier (required)
        in: query
        name: client_id
        required: true
        schema:
          type: string
      - description: Client secret (required for confidential clients)
        in: query
        name: client_secret
        required: true
        schema:
          type: string
      - description: Redirect URI (required for authorization_code grant)
        in: query
        name: redirect_uri
        required: false
        schema:
          type: string
      responses:
        '200':
          content:
            application/json:
              example:
                access_token: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
                expires_in: 3600
                refresh_token: ref_123456789
                scope: openid profile
                token_type: Bearer
          description: Token response with access_token and refresh_token
        '400':
          content:
            application/json:
              example:
                error: invalid_grant
                error_description: Invalid authorization code
          description: Invalid request
        '401':
          description: Authentication failed
      summary: Exchange authorization code for access token
      tags:
      - OAuth2
      - Token
  /oauth2/userinfo:
    get:
      description: Returns information about the authenticated user. Provides user
        profile data including username, email, and assigned roles according to OpenID
        Connect standards.
      operationId: get_oauth2_userinfo
      responses:
        '200':
          content:
            application/json:
              example:
                email: john@example.com
                name: john_doe
                roles:
                - user
                - admin
                sub: '1'
          description: User information retrieved successfully
        '400':
          description: Invalid User ID format
        '401':
          description: Invalid or expired access token
        '404':
          content:
            application/json:
              example:
                error: User not found
          description: User not found
      security:
      - bearerAuth: []
      summary: Get user information
      tags:
      - OAuth2
      - User
  /oauth2/webauthn/credentials:
    get:
      description: List registered WebAuthn credentials.
      operationId: get_oauth2_webauthn_credentials
      responses:
        '200':
          description: WebAuthn credentials list
        '401':
          description: Unauthorized
      security:
      - bearerAuth: []
      summary: List WebAuthn Credentials
      tags:
      - WebAuthn
  /oauth2/webauthn/login/begin:
    post:
      description: Start WebAuthn login.
      operationId: post_oauth2_webauthn_login_begin
      responses:
        '200':
          description: WebAuthn login options
      summary: WebAuthn Login Begin
      tags:
      - WebAuthn
  /oauth2/webauthn/login/finish:
    post:
      description: Finish WebAuthn login.
      operationId: post_oauth2_webauthn_login_finish
      responses:
        '200':
          description: WebAuthn login successful
        '400':
          description: Invalid request
        '401':
          description: Credential not found
      summary: WebAuthn Login Finish
      tags:
      - WebAuthn
  /oauth2/webauthn/register/begin:
    post:
      description: Start WebAuthn registration.
      operationId: post_oauth2_webauthn_register_begin
      responses:
        '200':
          description: WebAuthn registration options
        '401':
          description: Unauthorized
      security:
      - bearerAuth: []
      summary: WebAuthn Register Begin
      tags:
      - WebAuthn
  /oauth2/webauthn/register/finish:
    post:
      description: Finish WebAuthn registration.
      operationId: post_oauth2_webauthn_register_finish
      responses:
        '201':
          description: Passkey registered successfully
        '400':
          description: Invalid request
        '401':
          description: Unauthorized
      security:
      - bearerAuth: []
      summary: WebAuthn Register Finish
      tags:
      - WebAuthn
servers:
- description: Default server (relative path)
  url: /

openapi: 3.0.0
info:
  title: Drogon OAuth2 Provider API
  description: API documentation for the custom OAuth2 implementation using Drogon C++ Framework.
  version: 1.0.0
servers:
  - url: http://127.0.0.1:5555
    description: Local Development Server

paths:
  /oauth2/authorize:
    get:
      summary: Authorization Endpoint
      description: Requests user authorization and returns an authorization code.
      parameters:
        - name: response_type
          in: query
          required: true
          schema:
            type: string
            enum: [code]
            default: code
        - name: client_id
          in: query
          required: true
          schema:
            type: string
            default: vue-client
        - name: redirect_uri
          in: query
          required: true
          schema:
            type: string
            default: http://127.0.0.1:5173/callback
        - name: state
          in: query
          required: false
          schema:
            type: string
            default: xyz
        - name: scope
          in: query
          required: false
          schema:
            type: string
            default: openid profile
      responses:
        "302":
          description: Successful redirection with code.
          headers:
            Location:
              schema:
                type: string
                example: http://127.0.0.1:5173/callback?code=xyz&state=abc
        "400":
          description: Invalid request parameters.

  /oauth2/token:
    post:
      summary: Token Endpoint
      description: Exchanges authorization code for access token or refreshes access token.
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                grant_type:
                  type: string
                  enum: [authorization_code, refresh_token]
                  default: authorization_code
                code:
                  type: string
                  description: Paste the code obtained from /oauth2/login here (required for authorization_code grant)
                redirect_uri:
                  type: string
                  default: http://127.0.0.1:5173/callback
                  description: Required for authorization_code grant
                client_id:
                  type: string
                  default: vue-client
                client_secret:
                  type: string
                  default: 123456
                refresh_token:
                  type: string
                  description: Refresh token obtained from previous token exchange (required for refresh_token grant)
              required:
                - grant_type
                - client_id
                - client_secret
      responses:
        "200":
          description: Access Token generated successfully.
          content:
            application/json:
              schema:
                type: object
                properties:
                  access_token:
                    type: string
                  token_type:
                    type: string
                    example: Bearer
                  expires_in:
                    type: integer
                  refresh_token:
                    type: string
                  scope:
                    type: string
                  roles:
                    type: array
                    items:
                      type: string
        "400":
          description: Invalid request or unsupported grant type.
        "429":
          description: Rate limit exceeded (10 req/min).

  /oauth2/userinfo:
    get:
      summary: User Info Endpoint
      description: Helper endpoint to get user profile. Protected by Bearer Token. Returns user profile data including username, email, and assigned roles according to OpenID Connect standards.
      security:
        - bearerAuth: []
      responses:
        "200":
          description: User information retrieved successfully.
          content:
            application/json:
              schema:
                type: object
                properties:
                  sub:
                    type: string
                    description: User ID
                    example: "1"
                  name:
                    type: string
                    description: Username
                    example: john_doe
                  email:
                    type: string
                    description: Email address
                    example: john@example.com
                  roles:
                    type: array
                    description: User assigned roles
                    items:
                      type: string
                    example: ["user", "admin"]
              example:
                sub: "1"
                name: john_doe
                email: john@example.com
                roles: ["user", "admin"]
        "400":
          description: Invalid User ID format.
        "401":
          description: Invalid or expired access token.
        "404":
          description: User not found.

  /oauth2/login:
    post:
      summary: Login Form Submission
      description: Submit login form to authorize client. Use this instead of /oauth2/authorize for automation.
      parameters:
        - name: json
          in: query
          description: If true, returns 200 JSON with code instead of 302 Redirect (useful for API testing)
          schema:
            type: boolean
            default: true
      requestBody:
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                username:
                  type: string
                  default: admin
                password:
                  type: string
                  default: admin
                client_id:
                  type: string
                  default: vue-client
                redirect_uri:
                  type: string
                  default: http://127.0.0.1:5173/callback
                response_type:
                  type: string
                  default: code
                scope:
                  type: string
                  default: openid profile
                state:
                  type: string
                  default: xyz
              required:
                - username
                - password
                - client_id
                - redirect_uri
      responses:
        "302":
          description: Redirect on success.
        "200":
          description: Login page on failure (re-render) or JSON success.
        "429":
          description: Rate limit exceeded (5 req/min).

  /api/register:
    post:
      summary: User Registration
      description: Register a new user. The 'user' role is assigned by default.
      requestBody:
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                username:
                  type: string
                  default: new_user
                password:
                  type: string
                  default: password123
                email:
                  type: string
                  default: test@example.com
      responses:
        "200":
          description: Registration successful.
        "400":
          description: Username exists or invalid data.
        "429":
          description: Rate limit exceeded (5 req/min).

  /api/admin/dashboard:
    get:
      summary: Admin Dashboard
      description: Protected endpoint requiring 'admin' role.
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Access allowed. Returns admin data.
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  status:
                    type: string
        "401":
          description: Unauthorized (Invalid Token).
        "403":
          description: Forbidden (Insufficient permissions/roles).
        "429":
          description: Rate limit exceeded (5 req/min).

  /oauth2/logout:
    post:
      summary: Logout Endpoint
      description: Logout user and revoke the current access token. Protected by Bearer Token.
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Logged out successfully.
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Logged out successfully
                  userId:
                    type: string
                    description: User ID of the logged out user
              example:
                message: Logged out successfully
                userId: "1"
        "401":
          description: Invalid or missing Authorization header.
        "403":
          description: Token does not belong to this user.
        "500":
          description: Internal server error (OAuth2Plugin not loaded or storage not available).

  /.well-known/oauth-authorization-server:
    get:
      summary: Authorization Server Metadata (RFC 8414)
      description: Returns configuration metadata for the OAuth 2.0 authorization server.
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  issuer:
                    type: string
                  authorization_endpoint:
                    type: string
                  token_endpoint:
                    type: string
                  introspection_endpoint:
                    type: string
                  revocation_endpoint:
                    type: string

  /oauth2/introspect:
    post:
      summary: Token Introspection (RFC 7662)
      description: Introspect an access token to get its metadata. Requires client authentication via HTTP Basic Auth or POST body.
      security:
        - basicAuth: []
        - {}
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                token:
                  type: string
                  description: The access token to introspect
                token_type_hint:
                  type: string
                  enum: [access_token, refresh_token]
                  default: access_token
                  description: Hint about the token type
              required:
                - token
      responses:
        "200":
          description: Token introspection successful.
          content:
            application/json:
              schema:
                type: object
                properties:
                  active:
                    type: boolean
                    description: Whether the token is active
                  client_id:
                    type: string
                    description: Client ID that was issued the token
                  token_type:
                    type: string
                    example: Bearer
                  exp:
                    type: integer
                    description: Expiration timestamp (Unix epoch)
                  iat:
                    type: integer
                    description: Issued timestamp (Unix epoch)
                  nbf:
                    type: integer
                    description: Not-before timestamp (Unix epoch)
                  sub:
                    type: string
                    description: Subject (user identifier)
                  aud:
                    type: string
                    description: Audience (client identifier)
                  iss:
                    type: string
                    description: Issuer URL
                  scope:
                    type: string
                    description: Granted scopes
              example:
                active: true
                client_id: vue-client
                token_type: Bearer
                exp: 1735689600
                iat: 1735686000
                nbf: 1735686000
                sub: local:alice
                aud: vue-client
                iss: https://oauth.example.com
                scope: openid profile
        "401":
          description: Client authentication failed.
        "400":
          description: Missing required token parameter.

  /oauth2/revoke:
    post:
      summary: Token Revocation (RFC 7009)
      description: Revoke an access token. Requires client authentication. Only the client that issued the token can revoke it. Returns 200 OK even if token doesn't exist (to prevent token probing).
      security:
        - basicAuth: []
        - {}
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                token:
                  type: string
                  description: The access token to revoke
                token_type_hint:
                  type: string
                  enum: [access_token, refresh_token]
                  default: access_token
                  description: Hint about the token type
              required:
                - token
      responses:
        "200":
          description: Token revoked successfully (or token didn't exist).
        "401":
          description: Client authentication failed.
        "403":
          description: Client is not authorized to revoke this token (not the token owner).
        "400":
          description: Missing required token parameter.

  /health:
    get:
      summary: Health Check Endpoint
      description: Health check endpoint for monitoring/orchestration systems. Returns 200 OK if service is healthy.
      responses:
        "200":
          description: Service is healthy.
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
                  service:
                    type: string
                    example: OAuth2Server
                  timestamp:
                    type: integer
                    description: Unix timestamp
                  storage_type:
                    type: string
                    description: Type of storage backend (memory/redis/postgres/cached)
                  database:
                    type: string
                    enum: [connected, disconnected, unknown]
        "503":
          description: Service is unhealthy (database disconnected).

  /api/wechat/login:
    post:
      summary: WeChat Login
      description: WeChat OAuth2 login endpoint. Exchanges authorization code for WeChat user information.
      parameters:
        - name: code
          in: query
          required: true
          schema:
            type: string
          description: Authorization code from WeChat OAuth2 flow
      responses:
        "200":
          description: Successfully retrieved WeChat user information.
          content:
            application/json:
              schema:
                type: object
                properties:
                  openid:
                    type: string
                    description: WeChat user OpenID
                  nickname:
                    type: string
                    description: WeChat nickname
                  headimgurl:
                    type: string
                    description: WeChat profile picture URL
                  sex:
                    type: integer
                    description: Gender (1=male, 2=female, 0=unknown)
                  city:
                    type: string
                    description: City
                  province:
                    type: string
                    description: Province
                  country:
                    type: string
                    description: Country
        "400":
          description: Missing code parameter or WeChat API error.
        "502":
          description: Failed to contact WeChat API.

  /api/google/login:
    post:
      summary: Google Login
      description: Google OAuth2 login endpoint. Exchanges authorization code for Google user information.
      parameters:
        - name: code
          in: query
          required: true
          schema:
            type: string
          description: Authorization code from Google OAuth2 flow
      responses:
        "200":
          description: Successfully retrieved Google user information.
          content:
            application/json:
              schema:
                type: object
                properties:
                  sub:
                    type: string
                    description: Google user ID
                  name:
                    type: string
                    description: Full name
                  email:
                    type: string
                    description: Email address
                  picture:
                    type: string
                    description: Profile picture URL
        "400":
          description: Missing code parameter or Google API error.
        "502":
          description: Failed to contact Google API.

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
    basicAuth:
      type: http
      scheme: basic
      description: Client authentication using HTTP Basic Auth (client_id:client_secret)

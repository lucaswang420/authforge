components:
  schemas:
    Error:
      properties:
        category:
          type: string
        code:
          type: integer
        details:
          type: string
        message:
          type: string
        request_id:
          type: string
      type: object
    TokenResponse:
      properties:
        access_token:
          type: string
        expires_in:
          type: integer
        refresh_token:
          type: string
        token_type:
          type: string
      type: object
  securitySchemes:
    bearerAuth:
      scheme: bearer
      type: http
info:
  description: OAuth2.0 authorization server with token management
  title: OAuth2 Authorization Server API
  version: 1.0.0
openapi: 3.0.0
paths:
  /api/admin/clients:
    get:
      description: Get a paginated list of registered OAuth2 clients.
      operationId: get_api_admin_clients
      responses: null
      security:
        bearerAuth:
        - bearerAuth
      summary: List OAuth2 Clients
      tags:
      - Admin
      - Clients
    post:
      description: Register a new OAuth2 client.
      operationId: post_api_admin_clients
      responses: null
      security:
        bearerAuth:
        - bearerAuth
      summary: Create OAuth2 Client
      tags:
      - Admin
      - Clients
  /api/admin/clients/{clientId}:
    delete:
      description: Delete a specific OAuth2 client.
      operationId: delete_api_admin_clients_{clientId}
      responses: null
      security:
        bearerAuth:
        - bearerAuth
      summary: Delete OAuth2 Client
      tags:
      - Admin
      - Clients
    get:
      description: Get details of a specific OAuth2 client by ID.
      operationId: get_api_admin_clients_{clientId}
      responses: null
      security:
        bearerAuth:
        - bearerAuth
      summary: Get Client Details
      tags:
      - Admin
      - Clients
    put:
      description: Update details of a specific OAuth2 client.
      operationId: put_api_admin_clients_{clientId}
      responses: null
      security:
        bearerAuth:
        - bearerAuth
      summary: Update OAuth2 Client
      tags:
      - Admin
      - Clients
  /api/admin/clients/{clientId}/reset-secret:
    post:
      description: Reset the secret of a specific OAuth2 client.
      operationId: post_api_admin_clients_{clientId}_reset-secret
      responses: null
      security:
        bearerAuth:
        - bearerAuth
      summary: Reset Client Secret
      tags:
      - Admin
      - Clients
  /api/admin/clients/{clientId}/scopes:
    get:
      description: Get the assigned scopes for an OAuth2 client.
      operationId: get_api_admin_clients_{clientId}_scopes
      responses: null
      security:
        bearerAuth:
        - bearerAuth
      summary: Get Client Scopes
      tags:
      - Admin
      - Clients
    put:
      description: Update the assigned scopes for an OAuth2 client.
      operationId: put_api_admin_clients_{clientId}_scopes
      responses: null
      security:
        bearerAuth:
        - bearerAuth
      summary: Update Client Scopes
      tags:
      - Admin
      - Clients
  /api/admin/logs:
    get:
      description: Get a paginated list of system audit logs.
      operationId: get_api_admin_logs
      responses: null
      security:
        bearerAuth:
        - bearerAuth
      summary: List Audit Logs
      tags:
      - Admin
      - Logs
  /api/admin/oidc/keys:
    get:
      description: Get information about OIDC signing keys.
      operationId: get_api_admin_oidc_keys
      responses: null
      security:
        bearerAuth:
        - bearerAuth
      summary: Get OIDC Keys Info
      tags:
      - Admin
      - OIDC
  /api/admin/scopes:
    get:
      description: Get a list of all available scopes.
      operationId: get_api_admin_scopes
      responses: null
      security:
        bearerAuth:
        - bearerAuth
      summary: List Scopes
      tags:
      - Admin
      - Scopes
  /api/admin/tokens:
    get:
      description: Get a list of active OAuth2 tokens.
      operationId: get_api_admin_tokens
      responses: null
      security:
        bearerAuth:
        - bearerAuth
      summary: List Tokens
      tags:
      - Admin
      - Tokens
  /api/admin/tokens/revoke-by-client:
    post:
      description: Revoke all tokens issued to a specific client.
      operationId: post_api_admin_tokens_revoke-by-client
      responses: null
      security:
        bearerAuth:
        - bearerAuth
      summary: Revoke Tokens By Client
      tags:
      - Admin
      - Tokens
  /api/admin/tokens/revoke-by-user:
    post:
      description: Revoke all tokens issued for a specific user.
      operationId: post_api_admin_tokens_revoke-by-user
      responses: null
      security:
        bearerAuth:
        - bearerAuth
      summary: Revoke Tokens By User
      tags:
      - Admin
      - Tokens
  /api/admin/tokens/{tokenPrefix}:
    delete:
      description: Revoke a specific token by its prefix.
      operationId: delete_api_admin_tokens_{tokenPrefix}
      responses: null
      security:
        bearerAuth:
        - bearerAuth
      summary: Revoke Token
      tags:
      - Admin
      - Tokens
  /api/admin/users:
    get:
      description: Get a paginated list of users.
      operationId: get_api_admin_users
      responses: null
      security:
        bearerAuth:
        - bearerAuth
      summary: List Users
      tags:
      - Admin
      - Users
  /api/admin/users/{userId}/disable:
    put:
      description: Disable a specific user account.
      operationId: put_api_admin_users_{userId}_disable
      responses: null
      security:
        bearerAuth:
        - bearerAuth
      summary: Disable User
      tags:
      - Admin
      - Users
  /api/admin/users/{userId}/roles:
    put:
      description: Assign roles to a specific user.
      operationId: put_api_admin_users_{userId}_roles
      responses: null
      security:
        bearerAuth:
        - bearerAuth
      summary: Assign User Roles
      tags:
      - Admin
      - Users
  /api/google/login:
    post:
      description: Exchange Google authorization code for user information. This endpoint
        handles the server-side OAuth2 flow with Google Identity Platform.
      operationId: post_api_google_login
      parameters:
      - description: Authorization code from Google OAuth2 callback (required)
        in: query
        name: code
        required: true
        schema:
          type: string
      responses:
        '200':
          content:
            application/json:
              example:
                email: john.doe@gmail.com
                name: John Doe
                picture: https://lh3.googleusercontent.com/...
                sub: '123456789012345678901'
          description: Google user info retrieved successfully
        '400':
          content:
            application/json:
              example:
                error: Missing code parameter
          description: Invalid request (missing or invalid code)
        '502':
          description: Failed to contact Google API
      summary: Google OAuth2 Login
      tags:
      - External Auth
      - Google
  /api/register:
    post:
      description: Registers a new user account into the system.
      operationId: post_api_register
      parameters:
      - description: Desired username (required)
        in: query
        name: username
        required: true
        schema:
          type: string
      - description: Strong password (required)
        in: query
        name: password
        required: true
        schema:
          type: string
      - description: Email address (optional)
        in: query
        name: email
        required: false
        schema:
          type: string
      responses:
        '200':
          content:
            application/json:
              example:
                message: User registered successfully
                status: success
          description: User registered successfully
        '400':
          description: Invalid registration data
      summary: Register new user
      tags:
      - User
      - Registration
  /api/wechat/login:
    post:
      description: Exchange WeChat authorization code for user information. This endpoint
        handles the server-side OAuth2 flow with WeChat Open Platform.
      operationId: post_api_wechat_login
      parameters:
      - description: Authorization code from WeChat OAuth2 callback (required)
        in: query
        name: code
        required: true
        schema:
          type: string
      responses:
        '200':
          content:
            application/json:
              example:
                headimgurl: https://thirdwx.qlogo.cn/...
                nickname: WeChat User
                openid: oXXXXXXXXXXXXXXXXXXXXXXXXXX
          description: WeChat user info retrieved successfully
        '400':
          content:
            application/json:
              example:
                error: Missing code parameter
          description: Invalid request (missing or invalid code)
        '502':
          description: Failed to contact WeChat API
      summary: WeChat OAuth2 Login
      tags:
      - External Auth
      - WeChat
  /health:
    get:
      description: Returns the health status of the service.
      operationId: get_health
      responses:
        '200':
          content:
            application/json:
              example:
                status: ok
                version: 1.0.0
          description: Service is healthy
      summary: Health check
      tags:
      - System
  /oauth2/consent:
    post:
      description: Submit user consent for requested scopes. Redirects back to client.
      operationId: post_oauth2_consent
      parameters:
      - description: Client identifier (required)
        in: query
        name: client_id
        required: true
        schema:
          type: string
      - description: User identifier (required)
        in: query
        name: user_id
        required: true
        schema:
          type: string
      - description: Requested scope to consent (required)
        in: query
        name: scope
        required: true
        schema:
          type: string
      - description: Redirect URI (required)
        in: query
        name: redirect_uri
        required: true
        schema:
          type: string
      - description: Opaque value to maintain state
        in: query
        name: state
        required: false
        schema:
          type: string
      - description: 'Action to perform: ''approve'' or ''deny'' (required)'
        in: query
        name: action
        required: true
        schema:
          enum:
          - approve
          - deny
          type: string
      responses:
        '302':
          description: Redirect to client with authorization code or error
      summary: Submit user consent
      tags:
      - OAuth2
      - Consent
  /oauth2/login:
    post:
      description: Authenticates user credentials and generates an authorization code.
        Usually called by the frontend login page during the authorization code flow.
      operationId: post_oauth2_login
      parameters:
      - description: User's account username (required)
        in: query
        name: username
        required: true
        schema:
          type: string
      - description: User's password (required)
        in: query
        name: password
        required: true
        schema:
          type: string
      - description: Client identifier matches the requesting app (required)
        in: query
        name: client_id
        required: true
        schema:
          type: string
      - description: Redirect URI matching the registered client (required)
        in: query
        name: redirect_uri
        required: true
        schema:
          type: string
      - description: Requested scope, space-separated (optional)
        in: query
        name: scope
        required: false
        schema:
          type: string
      - description: Opaque value to maintain state (recommended)
        in: query
        name: state
        required: false
        schema:
          type: string
      responses:
        '200':
          content:
            application/json:
              example:
                redirect_uri: http://127.0.0.1:5173/callback?code=xyz123
                status: success
          description: Authentication successful (JSON with redirect_uri)
        '302':
          description: Redirect with authorization code (if requested via browser)
        '401':
          content:
            application/json:
              example:
                error: invalid_client
          description: Authentication failed
      summary: Authenticate user
      tags:
      - OAuth2
      - Authentication
servers:
- description: Default server (relative path)
  url: /

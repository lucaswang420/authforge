version: '3.8'

services:
  # PostgreSQL Database (matches Linux CI version)
  postgres:
    image: postgres:15-alpine
    container_name: oauth2-postgres
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: test
      POSTGRES_PASSWORD: 123456
    ports:
      - "5432:5432"
    volumes:
      - postgres_test_data:/var/lib/postgresql/data
      - ./sql:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U test"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Redis Cache (matches Linux CI version)
  redis:
    image: redis:7-alpine
    container_name: oauth2-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_test_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_test_data:
    name: oauth2-plugin-example_postgres_test
  redis_test_data:
    name: oauth2-plugin-example_redis_test


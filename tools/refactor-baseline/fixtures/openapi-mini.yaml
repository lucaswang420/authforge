openapi: 3.0.0
info:
  title: Mini OAuth2 API
  version: 1.0.0
paths:
  /.well-known/openid-configuration:
    get:
      summary: OIDC Discovery
      operationId: get_.well-known_openid-configuration
      tags: [OpenID Connect]
      responses:
        '200':
          description: OIDC Provider Metadata
          content:
            application/json:
              schema:
                type: object
  /oauth2/token:
    post:
      summary: Token endpoint
      operationId: post_oauth2_token
      tags: [OAuth2]
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Token issued
          content:
            application/json:
              schema:
                type: object
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                type: object
  /api/admin/clients:
    get:
      summary: List clients
      operationId: get_api_admin_clients
      tags: [Admin]
      security:
        - bearerAuth: []
      responses:
        '200':
          description: ok
    post:
      summary: Create client
      operationId: post_api_admin_clients
      tags: [Admin]
      security:
        - bearerAuth: []
      responses:
        '201':
          description: created

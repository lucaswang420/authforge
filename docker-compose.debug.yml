services:
  # PostgreSQL for testing
  oauth2-postgres-debug:
    image: postgres:15-alpine
    container_name: oauth2-postgres-debug
    environment:
      POSTGRES_USER: test
      POSTGRES_PASSWORD: 123456
      POSTGRES_DB: oauth_test
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U test"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - oauth2-debug-net

  # Redis for testing
  oauth2-redis-debug:
    image: redis:7-alpine
    container_name: oauth2-redis-debug
    command: redis-server --requirepass 123456
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - oauth2-debug-net

  # Linux debug environment
  debug-env:
    image: oauth2-backend-debug:v1.9.12
    container_name: oauth2-backend-debug
    volumes:
      # Mount the entire project directory
      - .:/app:cached
      # Build cache to speed up rebuilds
      - oauth2-build-cache:/build-cache
    working_dir: /app
    # Keep container running for interactive debugging
    stdin_open: true
    tty: true
    # Depends on databases to be ready
    depends_on:
      oauth2-postgres-debug:
        condition: service_healthy
      oauth2-redis-debug:
        condition: service_healthy
    command: /bin/bash
    environment:
      - DISPLAY=${DISPLAY:-}
      # PostgreSQL connection info
      - OAUTH2_DB_HOST=oauth2-postgres-debug
      - OAUTH2_DB_PORT=5432
      - OAUTH2_DB_USER=test
      - OAUTH2_DB_PASSWORD=123456
      - OAUTH2_DB_NAME=oauth_test
      # Redis connection info
      - OAUTH2_REDIS_HOST=oauth2-redis-debug
      - OAUTH2_REDIS_PORT=6379
      - OAUTH2_REDIS_PASSWORD=123456
    networks:
      - oauth2-debug-net

volumes:
  oauth2-build-cache:
    name: oauth2-plugin_build_cache

networks:
  oauth2-debug-net:
    driver: bridge

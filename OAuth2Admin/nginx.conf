server {
    listen 80;
    server_name _;

    # Admin Console SPA — served under /admin/ prefix
    location / {
        root /usr/share/nginx/html/admin;
        try_files $uri $uri/ /admin/index.html;
    }

    # Cache static assets
    location /admin/assets/ {
        root /usr/share/nginx/html;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
